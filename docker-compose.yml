services:
  db:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Admin@123
      MYSQL_DATABASE: mona_interior_db
    ports:
      - "3306:3306"
    healthcheck:
      # MySQL specific healthcheck
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pAdmin@123",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Pointing to 'db' service name instead of 127.0.0.1
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=mona_interior_db;User=root;Password=Admin@123;SslMode=none;"

  client:
    build: ./client
    ports:
      - "5173:5173"
